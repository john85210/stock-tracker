<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票週報追蹤系統</title>
<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --bg3: #334155;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #22c55e;
  --red: #ef4444;
  --gold: #eab308;
  --border: #475569;
  --card: #1e293b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent2); text-decoration: none; }

/* Header */
.header { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 24px; font-weight: 700; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-right { display: flex; align-items: center; gap: 12px; }
.btn { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); cursor: pointer; font-size: 14px; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--bg3); border-color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-danger { background: #dc2626; border-color: #dc2626; color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Week Navigation */
.week-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 16px 32px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.week-nav button { background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 18px; }
.week-nav button:hover { border-color: var(--accent); background: var(--bg3); }
.week-label { font-size: 18px; font-weight: 600; min-width: 320px; text-align: center; }

/* Main Content */
.main { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

/* Summary Cards */
.summary-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.summary-card { flex: 1; min-width: 180px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
.summary-card .label { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.summary-card .value { font-size: 24px; font-weight: 700; }
.summary-card .value.up { color: var(--red); }
.summary-card .value.down { color: var(--green); }

/* Group Section */
.group-section { margin-bottom: 32px; }
.group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 8px 0; border-bottom: 2px solid var(--accent); }
.group-title { font-size: 18px; font-weight: 700; color: var(--accent2); }

/* Table */
.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { background: var(--bg3); padding: 12px 14px; text-align: left; font-weight: 600; color: var(--text2); white-space: nowrap; position: sticky; top: 0; }
tbody td { padding: 10px 14px; border-top: 1px solid rgba(71,85,105,.4); vertical-align: middle; }
tbody tr { transition: background .15s; }
tbody tr:hover { background: rgba(59,130,246,.08); }
.code { font-weight: 700; color: var(--accent2); font-size: 15px; }
.name { font-weight: 600; }
.reason { max-width: 400px; font-size: 13px; color: var(--text2); line-height: 1.5; }
.price { font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
.return-cell { font-weight: 700; text-align: right; font-size: 15px; font-variant-numeric: tabular-nums; }
.return-cell.pos { color: var(--red); }
.return-cell.neg { color: var(--green); }
.index-row { background: rgba(234,179,8,.08); }
.index-row td { border-top: 2px solid var(--gold); border-bottom: 2px solid var(--gold); }
.action-cell { white-space: nowrap; }

/* Admin Panel */
.admin-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; justify-content: center; align-items: flex-start; padding-top: 80px; }
.admin-overlay.show { display: flex; }
.admin-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
.admin-panel h2 { font-size: 20px; margin-bottom: 20px; color: var(--accent2); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.admin-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 90%; max-width: 500px; }
.modal h3 { font-size: 18px; margin-bottom: 16px; }

/* Password Dialog */
.pw-dialog { text-align: center; }
.pw-dialog input { max-width: 300px; margin: 12px auto; display: block; text-align: center; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 999; transform: translateY(100px); opacity: 0; transition: all .3s; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { background: #dc2626; }
.toast.success { background: #16a34a; }

/* Fetch Status */
.fetch-status { font-size: 12px; color: var(--text2); margin-top: 4px; }
.fetch-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-tse { background: rgba(59,130,246,.2); color: var(--accent2); }
.badge-otc { background: rgba(168,85,247,.2); color: #c084fc; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 14px 16px; }
  .header h1 { font-size: 18px; }
  .main { padding: 16px; }
  .week-nav { padding: 12px 16px; }
  .week-label { font-size: 15px; min-width: auto; }
  .summary-row { gap: 8px; }
  .summary-card { min-width: 140px; padding: 12px; }
  .reason { max-width: 200px; }
}

/* Note section for Taiwan market convention */
.note-taiwan { font-size: 12px; color: var(--text2); padding: 0 32px 16px; text-align: center; }
.note-taiwan span { color: var(--red); }
.note-taiwan .green-note { color: var(--green); }

/* Range Selector */
.range-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 32px; background: var(--bg); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.range-bar .label { font-size: 13px; color: var(--text2); margin-right: 4px; }
.range-btn { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; font-size: 13px; transition: all .2s; }
.range-btn:hover { border-color: var(--accent); color: var(--text); }
.range-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.range-info { font-size: 13px; color: var(--accent2); margin-left: 12px; }

/* Top 5 Voted */
.top5-section { margin-bottom: 28px; }
.top5-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--gold); }
.top5-title { font-size: 18px; font-weight: 700; color: var(--gold); }
.top5-grid { display: flex; gap: 12px; flex-wrap: wrap; }
.top5-card { flex: 1; min-width: 160px; max-width: 240px; background: linear-gradient(135deg, rgba(234,179,8,.12) 0%, rgba(234,179,8,.03) 100%); border: 1px solid rgba(234,179,8,.3); border-radius: 12px; padding: 16px; position: relative; transition: transform .2s, box-shadow .2s; }
.top5-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(234,179,8,.15); }
.top5-rank { position: absolute; top: -8px; left: -8px; width: 28px; height: 28px; border-radius: 50%; background: var(--gold); color: #000; font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.top5-card .t5-code { font-size: 16px; font-weight: 700; color: var(--accent2); }
.top5-card .t5-name { font-size: 15px; font-weight: 600; margin-top: 2px; }
.top5-card .t5-return { font-size: 20px; font-weight: 700; margin-top: 8px; }
.top5-card .t5-return.pos { color: var(--red); }
.top5-card .t5-return.neg { color: var(--green); }
.top5-card .t5-prices { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Loading overlay */
.loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.loading-overlay .fetch-spinner { width: 32px; height: 32px; border-width: 3px; }
.loading-overlay p { color: var(--text2); font-size: 15px; }

/* Sync indicator */
.sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.sync-dot.online { background: var(--green); }
.sync-dot.offline { background: var(--red); }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <span class="fetch-spinner"></span>
  <p>正在連線 Firebase...</p>
</div>

<div class="header">
  <h1>&#x1f4c8; 股票週報追蹤系統</h1>
  <div class="header-right">
    <span id="syncStatus" style="font-size:12px; color:var(--text2);"><span class="sync-dot offline"></span>離線</span>
    <span id="adminIndicator" style="display:none; color: var(--gold); font-size: 13px;">&#x1f511; 管理員模式</span>
    <button class="btn" id="btnAdminToggle" onclick="toggleAdmin()">管理員登入</button>
    <button class="btn" onclick="exportData()">匯出資料</button>
    <button class="btn" onclick="document.getElementById('importInput').click()">匯入資料</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="week-nav">
  <button onclick="prevWeek()">&#x276E;</button>
  <div class="week-label" id="weekLabel">載入中...</div>
  <button onclick="nextWeek()">&#x276F;</button>
  <button class="btn btn-sm admin-only" style="display:none" onclick="showAddWeekModal()">+ 新增週</button>
  <button class="btn btn-sm admin-only" style="display:none; background:#5a1f1f; color:#ffb4b4;" onclick="deleteCurrentWeek()">&#x1f5d1; 刪除本週</button>
</div>

<div class="range-bar">
  <span class="label">報酬區間：</span>
  <button class="range-btn active" onclick="setRange(1)">1 週</button>
  <button class="range-btn" onclick="setRange(2)">2 週</button>
  <button class="range-btn" onclick="setRange(3)">3 週</button>
  <button class="range-btn" onclick="setRange(4)">4 週</button>
  <button class="range-btn" onclick="showCustomRange()">自訂</button>
  <span class="range-info" id="rangeInfo"></span>
</div>

<p class="note-taiwan">台股慣例：<span>紅色 = 上漲</span>，<span class="green-note">綠色 = 下跌</span></p>

<div class="main">
  <div class="summary-row" id="summaryRow"></div>
  <div id="stockContent"></div>
</div>

<!-- Admin Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal pw-dialog">
    <h3>&#x1f512; 管理員登入</h3>
    <p style="color: var(--text2); font-size: 14px;">請輸入管理員密碼</p>
    <div class="form-group">
      <input type="password" id="pwInput" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="display:flex; gap:8px; justify-content:center;">
      <button class="btn" onclick="closeModal('loginModal')">取消</button>
      <button class="btn btn-primary" onclick="doLogin()">登入</button>
    </div>
  </div>
</div>

<!-- Add Stock Modal -->
<div class="modal-overlay" id="addStockModal">
  <div class="modal">
    <h3>新增股票</h3>
    <input type="hidden" id="stockGroup" value="watchlist">
    <div class="form-row">
      <div class="form-group"><label>股票代號</label><input id="stockCode" placeholder="例：2330"></div>
      <div class="form-group"><label>股票名稱</label><input id="stockName" placeholder="例：台積電"></div>
    </div>
    <div class="form-group">
      <label>市場</label>
      <select id="stockMarket">
        <option value="tse">上市 (TSE)</option>
        <option value="otc">上櫃 (OTC)</option>
      </select>
    </div>
    <div class="form-group"><label>選擇原因</label><textarea id="stockReason" placeholder="為什麼選擇這檔股票？"></textarea></div>
    <div class="admin-actions">
      <button class="btn" onclick="closeModal('addStockModal')">取消</button>
      <button class="btn btn-primary" onclick="addStock()">新增</button>
    </div>
  </div>
</div>

<!-- Add Week Modal -->
<div class="modal-overlay" id="addWeekModal">
  <div class="modal">
    <h3>新增週報</h3>
    <div class="form-row">
      <div class="form-group"><label>週一日期</label><input type="date" id="newWeekStart"></div>
      <div class="form-group"><label>週五日期</label><input type="date" id="newWeekEnd"></div>
    </div>
    <p style="font-size:13px; color:var(--text2); margin-top:8px;">若遇假日請自行調整為實際交易日。股票清單會自動沿用上一週。</p>
    <div class="admin-actions">
      <button class="btn" onclick="closeModal('addWeekModal')">取消</button>
      <button class="btn btn-primary" onclick="addWeek()">新增</button>
    </div>
  </div>
</div>

<!-- Edit Price Modal -->
<div class="modal-overlay" id="editPriceModal">
  <div class="modal">
    <h3 id="editPriceTitle">編輯收盤價</h3>
    <div class="form-row">
      <div class="form-group"><label id="editMonLabel">週一開盤價</label><input type="number" step="0.01" id="editMonPrice"></div>
      <div class="form-group"><label id="editFriLabel">週五收盤價</label><input type="number" step="0.01" id="editFriPrice"></div>
    </div>
    <div class="admin-actions">
      <button class="btn" onclick="closeModal('editPriceModal')">取消</button>
      <button class="btn btn-primary" onclick="savePrice()">儲存</button>
    </div>
  </div>
</div>

<!-- Edit Top 5 Modal -->
<div class="modal-overlay" id="editTop5Modal">
  <div class="modal">
    <h3>&#x1f3c6; 編輯當週得票前五名</h3>
    <p style="font-size:13px; color:var(--text2); margin-bottom:12px;">從觀察股清單中選出本週得票數最高的五檔，依序填入代號。</p>
    <div class="form-group"><label>第 1 名</label><input id="top5_1" placeholder="股票代號，例：6147"></div>
    <div class="form-group"><label>第 2 名</label><input id="top5_2" placeholder="股票代號"></div>
    <div class="form-group"><label>第 3 名</label><input id="top5_3" placeholder="股票代號"></div>
    <div class="form-group"><label>第 4 名</label><input id="top5_4" placeholder="股票代號"></div>
    <div class="form-group"><label>第 5 名</label><input id="top5_5" placeholder="股票代號"></div>
    <div class="admin-actions">
      <button class="btn" onclick="closeModal('editTop5Modal')">取消</button>
      <button class="btn btn-primary" onclick="saveTop5()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ======================== LOCAL STORAGE ========================

// ★ 一次性清除舊快取，確保 v2 新功能（得票前五名）生效 ★
(function migrateOnce() {
  const migrationKey = 'stockTracker_v2_migrated';
  if (!localStorage.getItem(migrationKey)) {
    localStorage.removeItem('stockTrackerData');
    localStorage.setItem(migrationKey, '1');
  }
})();

function loadData() {
  try {
    const saved = localStorage.getItem('stockTrackerData');
    if (saved) {
      const data = JSON.parse(saved);
      // Migrate: ensure every week has topVotes array
      if (data.weeks) {
        data.weeks.forEach(w => {
          if (!w.topVotes) w.topVotes = [];
        });
      }
      return data;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(defaultData));
}

let appData = loadData();

function saveData() {
  localStorage.setItem('stockTrackerData', JSON.stringify(appData));
  render();
}

// Hide loading overlay & update sync status on init
document.getElementById('loadingOverlay').style.display = 'none';

// ======================== RANGE HELPERS ========================
function getRangeWeeks() {
  const endWeek = appData.weeks[currentWeekIdx];
  const startIdx = currentWeekIdx + selectedRange - 1;
  const startWeek = appData.weeks[startIdx] || null;
  return { startWeek, endWeek, startIdx };
}

function getRangePrices(code) {
  const { startWeek, endWeek } = getRangeWeeks();
  const endPrices = (endWeek && endWeek.prices) ? endWeek.prices[code] || {} : {};
  if (selectedRange === 1) {
    return { startPrice: endPrices.mon, endPrice: endPrices.fri, startDate: endWeek.startDate, endDate: endWeek.endDate };
  }
  const startPrices = (startWeek && startWeek.prices) ? startWeek.prices[code] || {} : {};
  return {
    startPrice: startPrices.mon,
    endPrice: endPrices.fri,
    startDate: startWeek ? startWeek.startDate : null,
    endDate: endWeek ? endWeek.endDate : null
  };
}

function calcReturn(startPrice, endPrice) {
  if (startPrice && endPrice) return ((endPrice - startPrice) / startPrice) * 100;
  return null;
}

function setRange(n) {
  selectedRange = n;
  const needed = currentWeekIdx + n;
  if (needed > appData.weeks.length) {
    showToast(`資料不足：需要 ${n} 週但只有 ${appData.weeks.length - currentWeekIdx} 週資料`, 'error');
    return;
  }
  render();
}

function showCustomRange() {
  const n = prompt('請輸入要計算幾週的報酬（數字）：', '2');
  if (n && parseInt(n) > 0) setRange(parseInt(n));
}

// ======================== RENDER ========================
function render() {
  const week = appData.weeks[currentWeekIdx];
  if (!week) return;

  document.getElementById('weekLabel').textContent =
    `第 ${week.weekNum} 週：${week.startDate.replace(/-/g,'/')} ~ ${week.endDate.replace(/-/g,'/')}`;

  document.querySelectorAll('.range-btn').forEach(btn => btn.classList.remove('active'));
  const rangeBtns = document.querySelectorAll('.range-btn');
  if (selectedRange >= 1 && selectedRange <= 4) {
    rangeBtns[selectedRange - 1].classList.add('active');
  } else {
    rangeBtns[4].classList.add('active');
  }

  const { startWeek, endWeek } = getRangeWeeks();
  const rangeInfoEl = document.getElementById('rangeInfo');
  if (selectedRange === 1) {
    rangeInfoEl.textContent = '';
  } else if (startWeek) {
    rangeInfoEl.textContent = `${startWeek.startDate.slice(5).replace('-','/')} → ${endWeek.endDate.slice(5).replace('-','/')}（共 ${selectedRange} 週）`;
  } else {
    rangeInfoEl.textContent = '⚠ 資料不足';
  }

  renderSummary();
  renderStockTables();

  document.querySelectorAll('.admin-only').forEach(el => {
    el.style.display = isAdmin ? '' : 'none';
  });
}

// 判斷一檔股票是否應該出現在某一週的清單裡
// 規則：如果沒有 addedWeekStart（舊資料），永遠顯示；否則只有當 週.startDate >= stock.addedWeekStart 才顯示
function stockVisibleInWeek(stock, week) {
  if (!week) return true;
  // 若該週把這檔股票標記為隱藏，則不顯示
  if (week.hiddenStocks && week.hiddenStocks.includes(stock.code)) return false;
  // 舊資料沒有 addedWeekStart 的永遠顯示
  if (!stock.addedWeekStart) return true;
  return week.startDate >= stock.addedWeekStart;
}

function getVisibleStocks(week, group) {
  return appData.stocks.filter(s => (!group || s.group === group) && stockVisibleInWeek(s, week));
}

function renderSummary() {
  const endWeek = appData.weeks[currentWeekIdx];
  const allStocks = getVisibleStocks(endWeek, 'watchlist');

  let watchUp = 0, watchDown = 0;
  let avgReturn = 0, count = 0;
  allStocks.forEach(s => {
    const { startPrice, endPrice } = getRangePrices(s.code);
    const r = calcReturn(startPrice, endPrice);
    if (r !== null) {
      avgReturn += r;
      count++;
      if (r > 0) watchUp++; else if (r < 0) watchDown++;
    }
  });
  if (count > 0) avgReturn /= count;

  const { startPrice: tMon, endPrice: tFri } = getRangePrices('TAIEX');
  const taiexReturn = calcReturn(tMon, tFri);

  const rangeLabel = selectedRange === 1 ? '本週' : `${selectedRange} 週`;

  document.getElementById('summaryRow').innerHTML = `
    <div class="summary-card">
      <div class="label">觀察股${rangeLabel}平均報酬</div>
      <div class="value ${avgReturn >= 0 ? 'up' : 'down'}">${count > 0 ? (avgReturn >= 0 ? '+' : '') + avgReturn.toFixed(2) + '%' : '-'}</div>
    </div>
    <div class="summary-card">
      <div class="label">上漲 / 下跌</div>
      <div class="value"><span style="color:var(--red)">${watchUp}</span> / <span style="color:var(--green)">${watchDown}</span></div>
    </div>
    <div class="summary-card">
      <div class="label">加權指數${rangeLabel}報酬</div>
      <div class="value ${taiexReturn !== null ? (taiexReturn >= 0 ? 'up' : 'down') : ''}">${taiexReturn !== null ? (taiexReturn >= 0 ? '+' : '') + taiexReturn.toFixed(2) + '%' : '-'}</div>
    </div>
    <div class="summary-card">
      <div class="label">追蹤股票數</div>
      <div class="value">${allStocks.length}</div>
    </div>
  `;
}

function renderStockTables() {
  const container = document.getElementById('stockContent');
  const endWeek = appData.weeks[currentWeekIdx];
  const { startWeek } = getRangeWeeks();
  const actualStartWeek = selectedRange === 1 ? endWeek : startWeek;

  const allStocks = [
    ...getVisibleStocks(endWeek, 'watchlist'),
    ...getVisibleStocks(endWeek, 'index'),
  ];

  allStocks.sort((a, b) => {
    const ra = calcReturn(getRangePrices(a.code).startPrice, getRangePrices(a.code).endPrice);
    const rb = calcReturn(getRangePrices(b.code).startPrice, getRangePrices(b.code).endPrice);
    return (rb !== null ? rb : -999) - (ra !== null ? ra : -999);
  });

  const startDateLabel = actualStartWeek ? actualStartWeek.startDate.slice(5) : '?';
  const endDateLabel = endWeek ? endWeek.endDate.slice(5) : '?';
  const returnLabel = selectedRange === 1 ? '本週報酬' : `${selectedRange} 週報酬`;

  // ---- Top 5 Voted Section ----
  const topVotes = endWeek.topVotes || [];
  let html = '';

  if (topVotes.length > 0) {
    html += `<div class="top5-section">
      <div class="top5-header">
        <span class="top5-title">&#x1f3c6; 當週得票數前五名</span>
        ${isAdmin ? `<button class="btn btn-sm" onclick="showEditTop5()">編輯</button>` : ''}
      </div>
      <div class="top5-grid">`;

    topVotes.forEach((code, i) => {
      const stock = appData.stocks.find(s => s.code === code);
      if (!stock) return;
      const { startPrice, endPrice } = getRangePrices(code);
      const ret = calcReturn(startPrice, endPrice);

      html += `<div class="top5-card">
        <div class="top5-rank">${i + 1}</div>
        <div class="t5-code">${stock.code} <span class="badge badge-${stock.market}" style="font-size:10px">${stock.market === 'tse' ? '上市' : '上櫃'}</span></div>
        <div class="t5-name">${stock.name}</div>
        <div class="t5-return ${ret !== null ? (ret >= 0 ? 'pos' : 'neg') : ''}">
          ${ret !== null ? (ret >= 0 ? '+' : '') + ret.toFixed(2) + '%' : '-'}
        </div>
        <div class="t5-prices">${startPrice != null ? startPrice.toLocaleString() : '-'} → ${endPrice != null ? endPrice.toLocaleString() : '-'}</div>
      </div>`;
    });

    html += `</div></div>`;
  } else if (isAdmin) {
    html += `<div class="top5-section">
      <div class="top5-header">
        <span class="top5-title">&#x1f3c6; 當週得票數前五名</span>
        <button class="btn btn-sm" onclick="showEditTop5()">設定</button>
      </div>
      <p style="color:var(--text2); font-size:14px; text-align:center; padding:20px;">尚未設定本週得票前五名，點右上角「設定」來新增。</p>
    </div>`;
  }

  // ---- Main Stock Table ----
  html += `<div class="group-section">
    <div class="group-header">
      <span class="group-title">&#x1f4ca; 本週觀察股</span>
      ${isAdmin ? `<button class="btn btn-sm admin-only" onclick="showAddStockModal('watchlist')">+ 新增股票</button>` : ''}
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th style="width:40px">#</th>
        <th>代號</th><th>標的</th><th>選擇原因</th>
        <th style="text-align:right">${startDateLabel} 開盤</th>
        <th style="text-align:right">${endDateLabel} 收盤</th>
        <th style="text-align:right">${returnLabel}</th>
        ${isAdmin ? '<th>操作</th>' : ''}
      </tr></thead><tbody>`;

  let rank = 0;
  allStocks.forEach(s => {
    const { startPrice, endPrice } = getRangePrices(s.code);
    const ret = calcReturn(startPrice, endPrice);
    const isIdx = s.group === 'index';
    rank++;

    html += `<tr class="${isIdx ? 'index-row' : ''}">
      <td style="text-align:center; font-weight:600; color:var(--text2)">${rank}</td>
      <td>
        ${isIdx
          ? `<span class="code" style="color:var(--gold)">&#x1f3e6;</span>`
          : `<span class="code">${s.code}</span> <span class="badge badge-${s.market}">${s.market === 'tse' ? '上市' : '上櫃'}</span>`
        }
      </td>
      <td class="name">${isIdx ? '<span style="color:var(--gold); font-weight:700">'+s.name+'</span>' : s.name}</td>
      <td class="reason">${s.reason}</td>
      <td class="price">${startPrice != null ? startPrice.toLocaleString() : '-'}</td>
      <td class="price">${endPrice != null ? endPrice.toLocaleString() : '-'}</td>
      <td class="return-cell ${ret !== null ? (ret >= 0 ? 'pos' : 'neg') : ''}">
        ${ret !== null ? (ret >= 0 ? '+' : '') + ret.toFixed(2) + '%' : '-'}
      </td>
      ${isAdmin ? `<td class="action-cell">

  if (isAdmin) {
    html += `<div style="text-align:center; padding: 20px 0;">

  }

  container.innerHTML = html;
}

// ======================== STOCK MANAGEMENT ========================
function showAddStockModal(group) {
  document.getElementById('stockGroup').value = group;
  document.getElementById('stockCode').value = '';
  document.getElementById('stockName').value = '';
  document.getElementById('stockReason').value = '';
  showModal('addStockModal');
}

async function addStock() {
  const code = document.getElementById('stockCode').value.trim();
  const name = document.getElementById('stockName').value.trim();
  const group = document.getElementById('stockGroup').value;
  const market = document.getElementById('stockMarket').value;
  const reason = document.getElementById('stockReason').value.trim();

  if (!code || !name) { showToast('請填寫代號和名稱', 'error'); return; }
  if (appData.stocks.find(s => s.code === code)) { showToast('此代號已存在', 'error'); return; }

  // 紀錄這檔股票是在哪一週被新增的，避免出現在更早的週別裡
  const currentWeek = appData.weeks[currentWeekIdx];
  const addedWeekStart = currentWeek ? currentWeek.startDate : null;
  appData.stocks.push({ code, name, group, market, reason, addedWeekStart });
  saveData();
  closeModal('addStockModal');
  showToast(`已新增 ${code} ${name}，正在抓取當週與前 4 週收盤價...`, 'success');

  // 自動抓取「目前檢視那一週 + 往前最多 4 週」的收盤價
  // 股票會透過 addedWeekStart 標記，只顯示在當週（含之後）的表格裡，
  // 但價格資料仍然會回填到前幾週，讓 2/3/4 週報酬區間能正確計算
  try {
    const weeksToFill = appData.weeks.slice(currentWeekIdx, currentWeekIdx + 5);
    if (weeksToFill.length === 0) return;

    const { filled } = await backfillStockPrices(code, market, weeksToFill);
    if (filled > 0) {
      saveData();
      showToast(`${code} 已回填 ${weeksToFill.length} 週 / ${filled} 筆收盤價`, 'success');
    } else {
      showToast(`${code} 抓取失敗，請手動輸入`, 'error');
    }
  } catch(e) {
    console.warn('addStock auto-fetch failed', e);
    showToast(`${code} 抓取失敗，請手動輸入`, 'error');
  }
}

// 只把股票從「目前檢視那一週」隱藏，不影響其他週
function removeStock(code) {
  const week = appData.weeks[currentWeekIdx];
  if (!week) return;
  const stock = appData.stocks.find(s => s.code === code);
  if (!stock) return;
  if (!confirm(`確定要從第 ${week.weekNum} 週移除 ${code} ${stock.name}？\n（只會影響本週，其他週別不受影響）`)) return;
  if (!week.hiddenStocks) week.hiddenStocks = [];
  if (!week.hiddenStocks.includes(code)) week.hiddenStocks.push(code);
  // 同時把這週這檔股票的價格資料清掉，避免後面範圍計算到
  if (week.prices && week.prices[code]) delete week.prices[code];
  saveData();
  showToast(`已從第 ${week.weekNum} 週移除 ${code}`, 'success');
}

// ======================== WEEK MANAGEMENT ========================
function showAddWeekModal() {
  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (today.getDay() === 0 ? 6 : today.getDay() - 1));
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  document.getElementById('newWeekStart').value = fmtDate(monday);
  document.getElementById('newWeekEnd').value = fmtDate(friday);
  showModal('addWeekModal');
}

function addWeek() {
  const start = document.getElementById('newWeekStart').value;
  const end = document.getElementById('newWeekEnd').value;
  if (!start || !end) { showToast('請選擇日期', 'error'); return; }
  const id = 'w' + start;
  if (appData.weeks.find(w => w.id === id)) { showToast('此週已存在', 'error'); return; }

  const d = new Date(start);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);

  appData.weeks.unshift({ id, startDate: start, endDate: end, weekNum, prices: {} });
  currentWeekIdx = 0;
  saveData();
  closeModal('addWeekModal');
  showToast('已新增新週報', 'success');
}

function deleteCurrentWeek() {
  if (!isAdmin) { showToast('需要管理員權限', 'error'); return; }
  if (appData.weeks.length === 0) { showToast('沒有可刪除的週', 'error'); return; }
  if (appData.weeks.length === 1) {
    showToast('至少要保留一週，無法刪除', 'error');
    return;
  }
  const week = appData.weeks[currentWeekIdx];
  if (!week) return;

  const msg = `確定要刪除「第 ${week.weekNum} 週 (${week.startDate} ~ ${week.endDate})」嗎？\n\n此動作無法復原，該週所有收盤價與得票名單都會被移除。`;
  if (!confirm(msg)) return;
  // 第二層確認，避免誤刪
  const confirm2 = prompt(`再次確認：請輸入「刪除」兩個字來確認刪除第 ${week.weekNum} 週`);
  if (confirm2 !== '刪除') {
    showToast('已取消刪除', 'success');
    return;
  }

  appData.weeks.splice(currentWeekIdx, 1);
  // 調整目前索引避免越界
  if (currentWeekIdx >= appData.weeks.length) {
    currentWeekIdx = appData.weeks.length - 1;
  }
  saveData();
  showToast(`已刪除第 ${week.weekNum} 週`, 'success');
}

// ======================== API FETCHING ========================
async function fetchAllPrices() {
  const week = appData.weeks[currentWeekIdx];
  const statusEl = document.getElementById('fetchStatus');
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="fetch-spinner"></span>抓取中...';
  statusEl.textContent = '';

  // 目標週：本週 + 往前最多 4 週（共最多 5 週），讓 2/3/4 週範圍也能正確計算
  const targetWeeks = appData.weeks.slice(currentWeekIdx, currentWeekIdx + 5);
  const fromDate = targetWeeks[targetWeeks.length - 1].startDate;
  const toDate = targetWeeks[0].endDate;

  // 只抓取在「當前這一週」可見的股票
  const stocks = appData.stocks.filter(s => s.code !== 'TAIEX' && stockVisibleInWeek(s, week));
  let success = 0, fail = 0;

  // 加權指數：一次抓整段日期
  statusEl.textContent = '正在抓取加權指數 (5 週)...';
  try {
    const map = await fetchYahooDateMap('%5ETWII', fromDate, toDate);
    if (map) {
      let tFilled = 0;
      targetWeeks.forEach(w => {
        const wp = extractWeekPricesFromMap(map, w.startDate, w.endDate);
        if (!wp) return;
        if (!w.prices) w.prices = {};
        if (!w.prices['TAIEX']) w.prices['TAIEX'] = {};
        if (wp.mon != null) { w.prices['TAIEX'].mon = wp.mon; tFilled++; }
        if (wp.fri != null) { w.prices['TAIEX'].fri = wp.fri; tFilled++; }
      });
      if (tFilled > 0) success++; else fail++;
    } else { fail++; }
  } catch(e) { console.warn('TAIEX fetch failed', e); fail++; }

  // 每檔股票：一次 API 請求把所有目標週的資料拉回來
  // 注意：不依 stockVisibleInWeek 過濾！新股票的價格資料仍要存到前幾週，
  // 這樣在本週檢視時把報酬區間拉長才能正確計算。表格顯示的過濾是另一層處理。
  for (let i = 0; i < stocks.length; i++) {
    const s = stocks[i];
    statusEl.textContent = `正在抓取 ${s.code} ${s.name} (${i+1}/${stocks.length}, ${targetWeeks.length} 週)...`;
    try {
      const result = await backfillStockPrices(s.code, s.market, targetWeeks);
      if (result && result.filled > 0) { success++; } else { fail++; }
    } catch(e) {
      console.warn(`Fetch failed for ${s.code}`, e);
      fail++;
    }
    await sleep(1200);
  }

  saveData();
  btn.disabled = false;
  btn.innerHTML = '&#x1f504; 自動抓取收盤價 (含前 4 週)';
  statusEl.textContent = `完成！成功 ${success} 檔，失敗 ${fail} 檔（共更新 ${targetWeeks.length} 週）${fail > 0 ? '，失敗的請手動輸入' : ''}`;
  showToast(`抓取完成：成功 ${success}，失敗 ${fail}（${targetWeeks.length} 週）`, fail > 0 ? 'error' : 'success');
}

const CORS_PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://cors-anywhere.herokuapp.com/${u}`
];

async function fetchViaProxy(url) {
  let lastErr = null;
  for (const makeUrl of CORS_PROXIES) {
    try {
      const proxied = makeUrl(url);
      const resp = await fetch(proxied, { cache: 'no-store' });
      if (!resp.ok) { lastErr = new Error(`HTTP ${resp.status}`); continue; }
      const text = await resp.text();
      if (!text || text.trim().length === 0) { lastErr = new Error('Empty response'); continue; }
      try {
        return JSON.parse(text);
      } catch(e) { lastErr = new Error('Invalid JSON: ' + text.slice(0,100)); continue; }
    } catch(e) { lastErr = e; continue; }
  }
  throw lastErr || new Error('All proxies failed');
}

// 從日期 map 中挑出一週的「首個交易日開盤」與「末個交易日收盤」
// 自動處理國定假日（週一放假→用週二開盤、週五放假→用週四收盤）
// 開盤→收盤才能完整反映整週漲幅
function extractWeekPricesFromMap(map, startDate, endDate) {
  if (!map) return null;
  const sd = new Date(startDate);
  const ed = new Date(endDate);
  const dates = [];
  for (let d = new Date(sd); d <= ed; d.setDate(d.getDate()+1)) {
    const key = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
    dates.push(key);
  }
  const trading = dates.filter(k => map[k] != null);
  if (trading.length === 0) return null;
  const first = map[trading[0]];
  const last = map[trading[trading.length - 1]];
  // 首日優先取開盤；若 open 缺失則退回 close
  const firstPrice = (first && first.open != null) ? first.open : (first ? first.close : null);
  const lastPrice = (last && last.close != null) ? last.close : (last ? last.open : null);
  return {
    mon: firstPrice,      // 該週首個交易日「開盤價」
    fri: lastPrice,       // 該週末個交易日「收盤價」
    monDate: trading[0],
    friDate: trading[trading.length - 1]
  };
}

// 抓一個較長的日期區間，回傳 { 'YYYY-MM-DD': {open, close}, ... }
async function fetchYahooDateMap(symbol, fromDate, toDate) {
  const startUnix = Math.floor(new Date(fromDate).getTime() / 1000) - 86400 * 3;
  const endUnix = Math.floor(new Date(toDate).getTime() / 1000) + 86400 * 3;
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${startUnix}&period2=${endUnix}&interval=1d`;
  console.log(`[fetch-range] ${symbol} ${fromDate}~${toDate} -> ${url}`);
  const data = await fetchViaProxy(url);
  const result = data?.chart?.result?.[0];
  if (!result) return null;
  const timestamps = result.timestamp || [];
  const quote = result.indicators?.quote?.[0] || {};
  const opens = quote.open || [];
  const closes = quote.close || [];
  const map = {};
  for (let i = 0; i < timestamps.length; i++) {
    if (opens[i] == null && closes[i] == null) continue;
    const d = new Date(timestamps[i] * 1000);
    const key = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
    map[key] = {
      open: opens[i] != null ? Math.round(opens[i] * 100) / 100 : null,
      close: closes[i] != null ? Math.round(closes[i] * 100) / 100 : null
    };
  }
  return map;
}

// 一次抓多週的收盤價並回填到 appData.weeks（只針對單一股票代號）
// 會自動處理上市/上櫃 fallback 與國定假日
async function backfillStockPrices(code, market, weeks) {
  if (!weeks || weeks.length === 0) return { filled: 0 };
  // 找出最早與最晚的日期
  const fromDate = weeks.reduce((m, w) => w.startDate < m ? w.startDate : m, weeks[0].startDate);
  const toDate = weeks.reduce((m, w) => w.endDate > m ? w.endDate : m, weeks[0].endDate);

  const primary = market === 'otc' ? `${code}.TWO` : `${code}.TW`;
  const fallback = market === 'otc' ? `${code}.TW` : `${code}.TWO`;
  let map = null;
  try { map = await fetchYahooDateMap(primary, fromDate, toDate); } catch(e) {}
  if (!map || Object.keys(map).length === 0) {
    try {
      map = await fetchYahooDateMap(fallback, fromDate, toDate);
      if (map && Object.keys(map).length > 0) {
        const stock = appData.stocks.find(s => s.code === code);
        if (stock) {
          stock.market = market === 'otc' ? 'tse' : 'otc';
          console.log(`[auto-fix] ${code} 市場類型已修正為 ${stock.market}`);
          showToast(`已自動修正 ${code} 的市場類型`, 'success');
        }
      }
    } catch(e) {}
  }
  if (!map) return { filled: 0 };

  let filled = 0;
  weeks.forEach(w => {
    const wp = extractWeekPricesFromMap(map, w.startDate, w.endDate);
    if (!wp) return;
    if (!w.prices) w.prices = {};
    if (!w.prices[code]) w.prices[code] = {};
    if (wp.mon != null) { w.prices[code].mon = wp.mon; filled++; }
    if (wp.fri != null) { w.prices[code].fri = wp.fri; filled++; }
  });
  return { filled };
}

// 用 Yahoo Finance API，上市/上櫃/指數統一格式
// 自動處理國定假日：首個交易日當週一、末個交易日當週五
async function fetchYahooClose(symbol, startDate, endDate) {
  const map = await fetchYahooDateMap(symbol, startDate, endDate);
  if (!map) return null;
  const wp = extractWeekPricesFromMap(map, startDate, endDate);
  return wp;
}

async function fetchStockPrices(code, market, startDate, endDate) {
  const primary = market === 'otc' ? `${code}.TWO` : `${code}.TW`;
  const fallback = market === 'otc' ? `${code}.TW` : `${code}.TWO`;
  try {
    const r = await fetchYahooClose(primary, startDate, endDate);
    if (r && (r.mon != null || r.fri != null)) return r;
  } catch(e) { console.warn(`[fallback] ${primary} failed, trying ${fallback}`, e); }

  // 主要市場失敗，試另一個市場
  try {
    const r2 = await fetchYahooClose(fallback, startDate, endDate);
    if (r2 && (r2.mon != null || r2.fri != null)) {
      // 自動修正使用者設錯的市場類型
      const correctedMarket = market === 'otc' ? 'tse' : 'otc';
      const stock = appData.stocks.find(s => s.code === code);
      if (stock) {
        stock.market = correctedMarket;
        console.log(`[auto-fix] ${code} 市場類型已修正為 ${correctedMarket}`);
        showToast(`已自動修正 ${code} 的市場類型`, 'success');
      }
      return r2;
    }
  } catch(e) { console.warn(`[fallback] ${fallback} also failed`, e); }

  return null;
}

async function fetchTaiexPrices(startDate, endDate) {
  return await fetchYahooClose('%5ETWII', startDate, endDate);
}

// ======================== EXPORT / IMPORT ========================
// 動態載入 xlsx-js-style（支援儲存格樣式的 SheetJS 分支）
async function ensureXLSXLoaded() {
  if (typeof XLSX !== 'undefined') return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function exportData() {
  try {
    await ensureXLSXLoaded();
  } catch(e) {
    showToast('載入 Excel 函式庫失敗，改用 JSON 匯出', 'error');
    exportJSON();
    return;
  }

  const week = appData.weeks[currentWeekIdx];
  if (!week) { showToast('沒有資料可以匯出', 'error'); return; }

  // 取得本週可見的觀察股（排除加權指數，稍後會依報酬率插入）
  const stocks = getVisibleStocks(week, 'watchlist');
  const withReturns = stocks.map(s => {
    const p = (week.prices || {})[s.code] || {};
    const ret = calcReturn(p.mon, p.fri);
    return { stock: s, mon: p.mon, fri: p.fri, ret };
  });
  // 依報酬率遞減排序；null 放最後
  withReturns.sort((a, b) => {
    const ra = a.ret == null ? -Infinity : a.ret;
    const rb = b.ret == null ? -Infinity : b.ret;
    return rb - ra;
  });

  const taiexP = (week.prices || {}).TAIEX || {};
  const taiexReturn = calcReturn(taiexP.mon, taiexP.fri);

  const monLabel = week.startDate.slice(5).replace('-', '/') + '開盤';
  const friLabel = week.endDate.slice(5).replace('-', '/') + '收盤';
  const header = ['股票代號', '標的', '選擇原因', monLabel, friLabel, '本週報酬率'];

  const rows = [header];
  const taiexRowData = ['', '加權指數', '', taiexP.mon ?? '', taiexP.fri ?? '',
                       taiexReturn != null ? taiexReturn / 100 : ''];
  let taiexInserted = false;
  let taiexRowIdx = -1;

  withReturns.forEach(item => {
    if (!taiexInserted && taiexReturn != null &&
        (item.ret == null || taiexReturn > item.ret)) {
      rows.push(taiexRowData);
      taiexRowIdx = rows.length - 1;
      taiexInserted = true;
    }
    rows.push([
      item.stock.code,
      item.stock.name,
      item.stock.reason || '',
      item.mon ?? '',
      item.fri ?? '',
      item.ret != null ? item.ret / 100 : ''
    ]);
  });
  if (!taiexInserted && taiexReturn != null) {
    rows.push(taiexRowData);
    taiexRowIdx = rows.length - 1;
  }

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // 欄寬
  ws['!cols'] = [
    { wch: 10 }, { wch: 12 }, { wch: 60 },
    { wch: 12 }, { wch: 12 }, { wch: 14 }
  ];

  // 列高：標題列高一點
  ws['!rows'] = [{ hpt: 24 }];

  const range = XLSX.utils.decode_range(ws['!ref']);

  // 樣式：header row
  for (let c = 0; c <= range.e.c; c++) {
    const addr = XLSX.utils.encode_cell({ r: 0, c });
    if (!ws[addr]) continue;
    ws[addr].s = {
      font: { bold: true, color: { rgb: "333333" }, sz: 11 },
      fill: { patternType: "solid", fgColor: { rgb: "F2F2F2" } },
      alignment: { horizontal: "center", vertical: "center", wrapText: true },
      border: {
        top:    { style: "thin", color: { rgb: "CCCCCC" } },
        bottom: { style: "thin", color: { rgb: "CCCCCC" } },
        left:   { style: "thin", color: { rgb: "CCCCCC" } },
        right:  { style: "thin", color: { rgb: "CCCCCC" } }
      }
    };
  }

  // 資料列樣式
  for (let r = 1; r <= range.e.r; r++) {
    const isTaiex = (r === taiexRowIdx);
    for (let c = 0; c <= range.e.c; c++) {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (!ws[addr]) ws[addr] = { t: 's', v: '' };

      const style = {
        font: { sz: 11 },
        alignment: { vertical: "center", wrapText: c === 2 },
        border: {
          top:    { style: "thin", color: { rgb: "EEEEEE" } },
          bottom: { style: "thin", color: { rgb: "EEEEEE" } },
          left:   { style: "thin", color: { rgb: "EEEEEE" } },
          right:  { style: "thin", color: { rgb: "EEEEEE" } }
        }
      };

      // 代號、收盤、報酬率置中
      if (c === 0 || c === 3 || c === 4 || c === 5) {
        style.alignment.horizontal = "center";
      }

      // 報酬率欄格式化為百分比，並上色（紅漲綠跌）
      if (c === 5) {
        ws[addr].z = '0.00%;[Red]-0.00%';
        const val = ws[addr].v;
        if (typeof val === 'number') {
          if (val > 0) style.font = { ...style.font, bold: true, color: { rgb: "CC0000" } };
          else if (val < 0) style.font = { ...style.font, bold: true, color: { rgb: "008800" } };
        }
      }

      // 加權指數整列用淺藍底
      if (isTaiex) {
        style.fill = { patternType: "solid", fgColor: { rgb: "DCE8F4" } };
        style.font = { ...style.font, bold: true };
        if (c === 5 && typeof ws[addr].v === 'number') {
          const v = ws[addr].v;
          style.font.color = { rgb: v >= 0 ? "CC0000" : "008800" };
        }
      }

      ws[addr].s = style;
    }
  }

  const wb = XLSX.utils.book_new();
  const sheetName = `第${week.weekNum}週`;
  XLSX.utils.book_append_sheet(wb, ws, sheetName);

  const filename = `stock-tracker-week${week.weekNum}-${week.startDate}.xlsx`;
  XLSX.writeFile(wb, filename);
  showToast('已匯出 Excel 檔', 'success');
}

// 保留 JSON 匯出作為備援（資料備份用）
function exportJSON() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `stock-tracker-${fmtDate(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('資料已匯出（JSON）', 'success');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (imported.stocks && imported.weeks) {
        appData = imported;
        currentWeekIdx = 0;
        saveData(); // push to Firebase
        showToast('資料匯入成功，已同步到雲端', 'success');
      } else {
        showToast('檔案格式不正確', 'error');
      }
    } catch(err) {
      showToast('匯入失敗：' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ======================== UTILS ========================
function showModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
  });
});

// ESC to close modals
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.show').forEach(el => el.classList.remove('show'));
  }
});

// Init
render();
